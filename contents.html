<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />

<title>Contents — Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Alkatra:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet" />
<style>
:root {
  --pink:   #ff66cc;
  --purple: #cc66ff;
  --white:  rgba(252,242,253,0.792);
  --dim:    rgba(255,255,255,0.521);
  --dimmer: rgba(255,255,255,0.41);
  --blue-cold: rgba(100,180,255,0.45);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  background:#000;
  color:var(--white);
  font-family:'Cormorant Garamond',serif;
  font-weight:300;
  height:100vh;
  overflow:hidden;
  cursor:none;
}

.vignette {
  position:fixed; inset:0;
  background:radial-gradient(ellipse at 50% 50%, transparent 30%, rgba(0,0,0,0.55) 70%, rgba(0,0,0,0.92) 100%);
  pointer-events:none; z-index:1;
}
.grain {
  position:fixed; inset:0; pointer-events:none; z-index:2; opacity:0.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size:180px 180px;
  animation:grainShift 0.18s steps(1) infinite;
}
@keyframes grainShift {
  0%   { background-position:0 0; }
  25%  { background-position:-40px -60px; }
  50%  { background-position:60px -20px; }
  75%  { background-position:-20px 40px; }
  100% { background-position:30px -50px; }
}

.edge-top {
  position:fixed; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,var(--blue-cold),transparent);
  z-index:3; pointer-events:none;
}
.edge-right {
  position:fixed; top:0; right:0; bottom:0; width:1px;
  background:linear-gradient(180deg,transparent,var(--blue-cold),transparent);
  z-index:3; pointer-events:none;
}

.starfield {
  position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden;
}
.starfield span {
  position:absolute; border-radius:50%; background:#fff;
  animation:twinkle var(--d,4s) ease-in-out infinite alternate; opacity:0;
}
@keyframes twinkle {
  0%   { opacity:0; }
  50%  { opacity:var(--op,0.18); }
  100% { opacity:0; }
}

.bg-stars { position:fixed; inset:0; pointer-events:none; z-index:3; }
.bg-star {
  position:absolute; color:var(--pink); font-size:var(--sz,18px); opacity:0;
  animation:bgStarBreath var(--bd,3s) ease-in-out infinite alternate;
  animation-delay:var(--bdelay,0s);
  filter:drop-shadow(0 0 4px var(--pink));
  line-height:1; user-select:none;
}
@keyframes bgStarBreath {
  0%   { opacity:0.08; transform:scale(0.9) rotate(0deg); }
  100% { opacity:0.4;  transform:scale(1.15) rotate(20deg); }
}

#floatStars {
  position:fixed; inset:0; z-index:4; pointer-events:none; overflow:hidden;
}
.fstar {
  position:absolute; font-size:var(--fsz,12px); line-height:1;
  color:var(--fcol,#ff66cc); opacity:0; user-select:none;
  will-change:transform,opacity;
  filter:drop-shadow(0 0 8px rgba(255,102,204,0.35));
}

#cursor {
  position:fixed; width:6px; height:6px; border-radius:50%;
  background:var(--pink); pointer-events:none; z-index:9999;
  transform:translate(-50%,-50%);
  box-shadow:0 0 8px var(--pink); transition:background 0.2s;
}
#cursorRing {
  position:fixed; width:32px; height:32px; border-radius:50%;
  border:1.5px solid rgba(204,102,255,0.6); pointer-events:none; z-index:9998;
  transform:translate(-50%,-50%);
  transition:width 0.25s ease, height 0.25s ease, border-color 0.25s ease;
}
#cursorRing.hover { width:48px; height:48px; border-color:rgba(255,102,204,0.5); }

.back-home {
  position:fixed; top:0; left:40px; height:68px;
  display:flex; align-items:center; gap:10px;
  text-decoration:none; pointer-events:all; z-index:101;
  opacity:0; animation:fadeIn 2s 0.6s ease forwards; cursor:none;
}
.back-home .back-arrow {
  width:28px; height:1px;
  background:linear-gradient(90deg,rgba(255,102,204,0.7),rgba(204,102,255,0.4));
  position:relative; transition:width 0.5s ease, opacity 0.4s ease; opacity:0.6;
}
.back-home .back-arrow::before {
  content:''; position:absolute; left:0; top:50%;
  transform:translateY(-50%) rotate(-45deg);
  width:6px; height:6px;
  border-left:1px solid rgba(255,102,204,0.8);
  border-bottom:1px solid rgba(255,102,204,0.8);
  transition:border-color 0.5s ease;
}
.back-home .back-label {
  font-family:'Cormorant Garamond',serif; font-weight:300;
  font-size:clamp(9px,1.05vw,12px); letter-spacing:0.28em;
  color:rgba(255,255,255,0.555); text-transform:uppercase;
  transition:color 0.5s ease, letter-spacing 0.5s ease;
}
.back-home:hover .back-arrow { width:38px; opacity:1; background:linear-gradient(90deg,rgba(255,102,204,1),rgba(204,102,255,0.7)); }
.back-home:hover .back-arrow::before { border-color:rgba(255,102,204,1); }
.back-home:hover .back-label { color:rgba(233,208,236,0.9); letter-spacing:0.35em; }

nav {
  position:fixed; top:0; left:0; right:0; z-index:100;
  display:flex; align-items:center; justify-content:center;
  padding:22px 40px;
  background:linear-gradient(180deg,rgba(0,0,0,0.72) 0%,transparent 100%);
}
nav a {
  font-family:'Cormorant Garamond',serif; font-weight:300;
  font-size:0.82rem; letter-spacing:0.22em; text-transform:uppercase;
  color:var(--dim); text-decoration:none; padding:4px 0;
  position:relative; transition:color 0.3s; cursor:none;
}
nav a::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,var(--pink),var(--purple));
  transform:scaleX(0); transform-origin:left; transition:transform 0.35s ease;
}
nav a:hover { color:var(--white); }
nav a:hover::after { transform:scaleX(1); }
.nav-divider {
  font-family:'Cormorant Garamond',serif; font-weight:300;
  color:var(--dimmer); margin:0 18px; font-size:0.9rem;
  pointer-events:none; user-select:none;
}

.side-label {
  position:fixed; font-family:'Cormorant Garamond',serif; font-weight:300;
  font-size:0.65rem; letter-spacing:0.28em; text-transform:uppercase;
  color:var(--dimmer); z-index:50; pointer-events:none;
}
.side-left  { left:18px; top:50%; transform:translateX(-50%) rotate(-90deg); }
.side-right { right:18px; top:50%; transform:translateX(50%) rotate(90deg); }

.center-stage {
  position:fixed; inset:0; z-index:10;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  pointer-events:none;
}

.deco-stars {
  display:flex; gap:22px; align-items:center; justify-content:center;
  margin-bottom:48px;
  animation:fadeUp 1.2s 0.3s cubic-bezier(0.16,1,0.3,1) both;
}
.deco-star {
  color:var(--pink); font-size:18px; line-height:1; user-select:none;
  filter:drop-shadow(0 0 8px rgba(255,102,204,0.7));
  animation:decoStarSpin var(--ds-dur,6s) linear infinite,
            decoBreath var(--ds-breath,3s) ease-in-out infinite alternate;
  animation-delay:var(--ds-delay,0s), var(--ds-bdelay,0s);
}
@keyframes decoStarSpin {
  from { transform:rotate(0deg); }
  to   { transform:rotate(360deg); }
}
@keyframes decoBreath {
  0%   { opacity:0.5; filter:drop-shadow(0 0 6px rgba(255,102,204,0.5)); }
  100% { opacity:1.0; filter:drop-shadow(0 0 14px rgba(255,102,204,0.9)); }
}

.page-eyebrow {
  font-family:'Cormorant Garamond',serif; font-weight:300;
  font-size:0.68rem; letter-spacing:0.42em; text-transform:uppercase;
  color:var(--dimmer); text-align:center; margin-bottom:32px;
  animation:fadeUp 1.2s 0.5s cubic-bezier(0.16,1,0.3,1) both;
}

.menu-list {

}

.menu-item {

  display:flex; align-items:center; gap:18px;

.menu-item::after {

.menu-star {

@keyframes menuStarSpin {

  to   { transform:rotate(360deg); }

.menu-link {

  color:var(--dim); text-decoration:none; cursor:none;
  position:relative; line-height:1;

}
.menu-link::after {

}
.menu-item:hover .menu-link { color:var(--white); letter-spacing:0.18em; }
.menu-item:hover .menu-link::after { transform:scaleX(1); }
.menu-item:hover .menu-star { filter:drop-shadow(0 0 12px rgba(255,102,204,1)); }

.bubble {
  position:absolute;
  bottom:calc(100% + 10px);
  left:50%;
  opacity:0;
  visibility:hidden;
  pointer-events:none;
  transform:translateX(-50%) translateY(10px);
  background:rgba(8,0,14,0.88);
  border:1px solid rgba(255,102,204,0.22);
  border-radius:12px;
  padding:14px 20px;
  white-space:nowrap;
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  box-shadow:0 0 28px rgba(255,102,204,0.12), 0 8px 32px rgba(0,0,0,0.6);
  transition:
    opacity  0.32s ease 0.18s,
    transform 0.32s cubic-bezier(0.16,1,0.3,1) 0.18s,
    visibility 0s linear 0.5s;
  z-index:200;
  display:flex; flex-direction:column; gap:2px;
}

.menu-item:hover .bubble {
  opacity:1;
  visibility:visible;
  pointer-events:all;
  transform:translateX(-50%) translateY(0);
  transition:
    opacity  0.32s ease 0s,
    transform 0.32s cubic-bezier(0.16,1,0.3,1) 0s,
    visibility 0s linear 0s;
}

.bubble::before {
  content:'';
  position:absolute;
  bottom:-8px; left:50%; transform:translateX(-50%);
  width:14px; height:8px;
  clip-path:polygon(0 0, 100% 0, 50% 100%);
  background:rgba(8,0,14,0.88);
}
.bubble::after {
  content:'';
  position:absolute;
  bottom:-9px; left:50%; transform:translateX(-50%);
  width:14px; height:9px;
  clip-path:polygon(0 0, 100% 0, 50% 100%);
  background:rgba(255,102,204,0.2);
  z-index:-1;
}

.bubble-link {
  font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  font-size:0.82rem; font-weight:300;
  letter-spacing:0.06em; color:var(--dim);
  text-decoration:none; cursor:none;
  padding:8px 12px; border-radius:6px;
  display:flex; align-items:center; gap:10px;
  transition:color 0.3s ease, background 0.3s ease;
}
.bubble-link::before {
  content:'\2726';
  color:var(--pink); font-size:0.55rem;
  opacity:0.45; flex-shrink:0;
  transition:opacity 0.3s, filter 0.3s;
  filter:drop-shadow(0 0 3px rgba(255,102,204,0.4));
}
.bubble-link:hover {
  color:var(--white);
  background:rgba(255,102,204,0.07);
}
.bubble-link:hover::before {
  opacity:1;
  filter:drop-shadow(0 0 7px rgba(255,102,204,0.9));
}
.bubble-link + .bubble-link {
  border-top:1px solid rgba(255,255,255,0.05);

@keyframes fadeUp {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes fadeIn {
  from { opacity:0; }
  to   { opacity:1; }
}

<script>
(function(){
  const dot  = document.getElementById('cursor');
  const ring = document.getElementById('cursorRing');
  let mx = window.innerWidth/2, my = window.innerHeight/2;
  let rx = mx, ry = my;
  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    dot.style.left = mx+'px'; dot.style.top = my+'px';
  });
  function animRing(){
    rx += (mx-rx)*0.09; ry += (my-ry)*0.09;
    ring.style.left = rx+'px'; ring.style.top = ry+'px';
    requestAnimationFrame(animRing);
  }
  animRing();
  function attachHover(sel){
    document.querySelectorAll(sel).forEach(el=>{
      el.addEventListener('mouseenter',()=>ring.classList.add('hover'));
      el.addEventListener('mouseleave',()=>ring.classList.remove('hover'));
    });
  }
  attachHover('a, .menu-item, .bubble-link, .back-home');
})();
</script>

<script>
(function(){
  const sf = document.getElementById('starfield');
  for(let i=0;i<80;i++){
    const s=document.createElement('span');
    const sz=Math.random()*1.8+0.6;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*5+3).toFixed(1)}s;--op:${(Math.random()*0.15+0.04).toFixed(2)};animation-delay:${(Math.random()*6).toFixed(1)}s;`;
    sf.appendChild(s);
  }
  const bs=document.getElementById('bgStars');
  const positions=[
    {x:'8%',y:'78%',sz:'22px',d:'3.1s',delay:'0s'},
    {x:'15%',y:'55%',sz:'10px',d:'2.7s',delay:'0.4s'},
    {x:'6%',y:'30%',sz:'14px',d:'3.8s',delay:'1.1s'},
    {x:'88%',y:'20%',sz:'12px',d:'2.5s',delay:'0.7s'},
    {x:'92%',y:'65%',sz:'18px',d:'4.0s',delay:'0.2s'},
    {x:'75%',y:'88%',sz:'10px',d:'3.3s',delay:'1.5s'},
    {x:'40%',y:'92%',sz:'16px',d:'2.9s',delay:'0.9s'},
    {x:'55%',y:'12%',sz:'9px',d:'3.5s',delay:'0.3s'},
  ];
  positions.forEach(p=>{
    const el=document.createElement('div');
    el.className='bg-star';
    el.textContent='\u2726';
    el.style.cssText=`left:${p.x};top:${p.y};--sz:${p.sz};--bd:${p.d};--bdelay:${p.delay};`;
    bs.appendChild(el);
  });
})();
</script>

<script>
(function(){
  const container=document.getElementById('floatStars');
  const reducedMotion=window.matchMedia('(prefers-reduced-motion:reduce)').matches;

  // ── 数量控制 ──────────────────────────────────────────
  // SPAWN_RATE: 每秒生成几颗（原来 1.8，现在 4.0 → 约多 2 倍）
  // MAX_STARS : 屏幕同时存在上限（原来 50，现在 100）
  const SPAWN_RATE = reducedMotion ? 0.3 : 4.0;   // <<< 改这里控制密度
  const MAX_STARS  = reducedMotion ? 10  : 100;   // <<< 改这里控制上限
  // ──────────────────────────────────────────────────────

  const DRIFT_REDUCE=reducedMotion?0.15:1;
  const CHARS=['\u2726','\u2727'];
  const COLORS=['#ff66cc','#dd77ff','#cc66ff','#ff88dd'];
  let dissolveY=window.innerHeight*0.33;
  window.addEventListener('resize',()=>{ dissolveY=window.innerHeight*0.33; });
  let stars=[],spawnAccum=0,lastTime=null;
  function spawnStar(){
    if(stars.length>=MAX_STARS)return;
    const el=document.createElement('div');
    el.className='fstar';
    const sz=6+Math.random()*12;
    const col=COLORS[Math.floor(Math.random()*COLORS.length)];
    const op=0.2+Math.random()*0.4;
    el.style.setProperty('--fsz',sz+'px');
    el.style.setProperty('--fcol',col);
    el.textContent=CHARS[Math.floor(Math.random()*CHARS.length)];
    const x=Math.random()*window.innerWidth;
    const y=window.innerHeight*(1.02+Math.random()*0.08);
    const speed=(22+Math.random()*38)*DRIFT_REDUCE;
    const driftFreq=0.4+Math.random()*0.8;
    const driftAmp=(8+Math.random()*18)*DRIFT_REDUCE;
    const driftOff=Math.random()*Math.PI*2;
    const fadeDur=500+Math.random()*400;
    el.style.left=x+'px'; el.style.top=y+'px'; el.style.opacity=op;
    container.appendChild(el);
    stars.push({el,x,y,speed,driftFreq,driftAmp,driftOff,baseOp:op,fadeDur,fading:false,fadeStart:0});
  }
  function tick(ts){
    if(!lastTime)lastTime=ts;
    const dt=Math.min((ts-lastTime)/1000,0.1);
    lastTime=ts;
    spawnAccum+=SPAWN_RATE*dt;
    while(spawnAccum>=1){ spawnStar(); spawnAccum-=1; }
    const toRemove=[];
    stars.forEach((p,i)=>{
      p.y-=p.speed*dt;
      const driftX=p.x+Math.sin(ts*0.001*p.driftFreq+p.driftOff)*p.driftAmp;
      p.el.style.left=driftX+'px'; p.el.style.top=p.y+'px';
      if(!p.fading&&p.y<=dissolveY){ p.fading=true; p.fadeStart=ts; }
      if(p.fading){
        const prog=Math.min((ts-p.fadeStart)/p.fadeDur,1);
        p.el.style.opacity=p.baseOp*(1-prog);
        if(prog>=1)toRemove.push(i);
      }
    });
    for(let i=toRemove.length-1;i>=0;i--){
      container.removeChild(stars[toRemove[i]].el);
      stars.splice(toRemove[i],1);
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();
</script>
