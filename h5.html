<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>"H5页面</title>
<link href="https://fonts.googleapis.com/css2?family=Alkatra:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
<style>
:root {
  --pink:   #ff66cc;
  --purple: #cc66ff;
  --white:  rgba(252,242,253,0.92);
  --dim:    rgba(255,255,255,0.521);
  --dimmer: rgba(255,255,255,0.41);
  --blue-cold: rgba(100,180,255,0.45);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  background:#000;
  color:var(--white);
  font-family:'Cormorant Garamond',serif;
  font-weight:300;
  overflow-x:hidden;
  cursor:none;
}

/* ─── GRAIN ─── */
.grain {
  position:fixed; inset:0; pointer-events:none; z-index:2; opacity:0.07;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size:180px 180px;
  animation:grainShift 0.8s steps(2) infinite;
}
@keyframes grainShift {
  0%   { background-position:0 0; }
  25%  { background-position:-40px -60px; }
  50%  { background-position:60px -20px; }
  75%  { background-position:-20px 40px; }
  100% { background-position:30px -50px; }
}

/* ─── EDGES ─── */
.edge-top {
  position:fixed; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,var(--blue-cold),transparent);
  z-index:3; pointer-events:none;
}
.edge-right {
  position:fixed; top:0; right:0; bottom:0; width:1px;
  background:linear-gradient(180deg,transparent,var(--blue-cold),transparent);
  z-index:3; pointer-events:none;
}

/* ─── STARFIELD ─── */
.starfield {
  position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden;
}
.starfield span {
  position:absolute; border-radius:50%; background:#fff;
  animation:twinkle var(--d,4s) ease-in-out infinite alternate; opacity:0;
}
@keyframes twinkle {
  0%   { opacity:0; }
  50%  { opacity:var(--op,0.18); }
  100% { opacity:0; }
}

/* ─── FLOATING STARS ─── */
#floatStars {
  position:fixed; inset:0; z-index:4; pointer-events:none; overflow:hidden;
}
.fstar {
  position:absolute; font-size:var(--fsz,12px); line-height:1;
  color:var(--fcol,#ff66cc); opacity:0; user-select:none;
  will-change:transform,opacity;
  filter:drop-shadow(0 0 8px rgba(255,102,204,0.35));
}

/* ─── CURSOR ─── */
#cursor {
  position:fixed; width:6px; height:6px; border-radius:50%;
  background:var(--pink); pointer-events:none; z-index:9999;
  transform:translate(-50%,-50%);
  box-shadow:0 0 8px var(--pink); transition:background 0.2s;
}
#cursorRing {
  position:fixed; width:32px; height:32px; border-radius:50%;
  border:1.5px solid rgba(204,102,255,0.6); pointer-events:none; z-index:9998;
  transform:translate(-50%,-50%);
  transition:width 0.25s ease, height 0.25s ease, border-color 0.25s ease;
}
#cursorRing.hover { width:48px; height:48px; border-color:rgba(255,102,204,0.5); }

/* ─── BACK HOME ─── */
.back-home {
  position:fixed; top:0; left:40px; height:68px;
  display:flex; align-items:center; gap:10px;
  text-decoration:none; pointer-events:all; z-index:101;
  opacity:0; cursor:none;
  transition:opacity 0.6s ease;
}
.back-home.visible { opacity:1; }
.back-home .back-arrow {
  width:28px; height:1px;
  background:linear-gradient(90deg,rgba(255,102,204,0.7),rgba(204,102,255,0.4));
  position:relative; transition:width 0.5s ease, opacity 0.4s ease; opacity:0.6;
}
.back-home .back-arrow::before {
  content:''; position:absolute; left:0; top:50%;
  transform:translateY(-50%) rotate(-45deg);
  width:6px; height:6px;
  border-left:1px solid rgba(255,102,204,0.8);
  border-bottom:1px solid rgba(255,102,204,0.8);
  transition:border-color 0.5s ease;
}
.back-home .back-label {
  font-family:'Cormorant Garamond',serif; font-weight:300;
  font-size:clamp(9px,1.05vw,12px); letter-spacing:0.28em;
  color:rgba(255,255,255,0.555); text-transform:uppercase;
  transition:color 0.5s ease, letter-spacing 0.5s ease;
}
.back-home:hover .back-arrow { width:38px; opacity:1; background:linear-gradient(90deg,rgba(255,102,204,1),rgba(204,102,255,0.7)); }
.back-home:hover .back-arrow::before { border-color:rgba(255,102,204,1); }
.back-home:hover .back-label { color:rgba(233,208,236,0.9); letter-spacing:0.35em; }

/* ─── NAV ─── */
nav {
  position:fixed; top:0; left:0; right:0; z-index:100;
  display:flex; align-items:center; justify-content:center;
  padding:22px 40px;
  background:linear-gradient(180deg,rgba(0,0,0,0.72) 0%,transparent 100%);
  opacity:0; transition:opacity 0.6s ease;
}
nav.visible { opacity:1; }
nav a {
  font-family:'Cormorant Garamond',serif; font-weight:300;
  font-size:0.82rem; letter-spacing:0.22em; text-transform:uppercase;
  color:var(--dim); text-decoration:none; padding:4px 0;
  position:relative; transition:color 0.3s; cursor:none;
}
nav a::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,var(--pink),var(--purple));
  transform:scaleX(0); transform-origin:left; transition:transform 0.35s ease;
}
nav a:hover { color:var(--white); }
nav a:hover::after { transform:scaleX(1); }
.nav-divider {
  font-family:'Cormorant Garamond',serif; font-weight:300;
  color:var(--dimmer); margin:0 18px; font-size:0.9rem;
  pointer-events:none; user-select:none;
}

/* ─── SIDE LABELS ─── */
.side-label {
  position:fixed; font-family:'Cormorant Garamond',serif; font-weight:300;
  font-size:0.65rem; letter-spacing:0.28em; text-transform:uppercase;
  color:var(--dimmer); z-index:50; pointer-events:none;
  opacity:0; transition:opacity 0.6s ease;
}
.side-label.visible { opacity:1; }
.side-left  { left:18px; top:50%; transform:translateX(-50%) rotate(-90deg); }
.side-right { right:18px; top:50%; transform:translateX(50%) rotate(90deg); }

/* ══════════════════════════════════════════
   INTRO OVERLAY — star burst animation
══════════════════════════════════════════ */
#introOverlay {
  position:fixed; inset:0; z-index:500;
  display:flex; align-items:center; justify-content:center;
  background:#000;
  pointer-events:all;
}
#introOverlay.done {
  pointer-events:none;
}

/* The central star */
#heroBurst {
  position:relative;
  display:flex; align-items:center; justify-content:center;
}

#mainStar {
  position:relative; z-index:10;
  color:var(--pink);
  font-size:48px; line-height:1;
  filter:drop-shadow(0 0 8px rgba(255,102,204,0.9));
  animation:starEntrance 0.7s cubic-bezier(0.16,1,0.3,1) both;
  transform-origin:center;
  will-change:transform,opacity,font-size;
}
@keyframes starEntrance {
  from { opacity:0; transform:scale(0.2) rotate(-120deg); }
  to   { opacity:1; transform:scale(1) rotate(0deg); }
}
#mainStar.breathing {
  animation:starEntrance 0.7s cubic-bezier(0.16,1,0.3,1) both,
            starBreath 1.4s ease-in-out infinite alternate 0.7s;
}
@keyframes starBreath {
  0%   { filter:drop-shadow(0 0 14px rgba(255,102,204,0.7)); transform:scale(0.95); }
  100% { filter:drop-shadow(0 0 32px rgba(255,102,204,1));   transform:scale(1.08); }
}
#mainStar.explode {
  animation:starExplode 1.1s cubic-bezier(0.4,0,0.2,1) forwards !important;
}
@keyframes starExplode {
  0%   { opacity:1; transform:scale(1);    filter:drop-shadow(0 0 32px rgba(255,102,204,1)); font-size:48px; }
  40%  { opacity:1; transform:scale(6);  filter:drop-shadow(0 0 80px rgba(255,102,204,1)); font-size:48px; }
  70%  { opacity:0.7; transform:scale(18);   filter:drop-shadow(0 0 120px rgba(255,102,204,0.9)); }
  100% { opacity:0; transform:scale(35);  filter:none; }
}


/* Orbit rings */
.orbit-ring {
  position:absolute;
  border-radius:50%;
  border:1px solid rgba(255,102,204,0.18);
  animation:orbitSpin var(--or-dur,8s) linear infinite;
  opacity:0;
  transition:opacity 0.5s ease;
}
.orbit-ring.visible { opacity:1; }
.orbit-ring::before {
  content:'';
  position:absolute;
  width:5px; height:5px;
  background:var(--pink);
  border-radius:50%;
  top:50%; left:var(--dot-pos,0%);
  transform:translate(-50%,-50%);
  box-shadow:0 0 8px var(--pink);
}
@keyframes orbitSpin {
  from { transform:rotate(0deg); }
  to   { transform:rotate(360deg); }
}
.orbit-ring.explode {
  animation:ringExplode 0.9s ease-out forwards !important;
}
@keyframes ringExplode {
  0%   { opacity:1; transform:scale(1); }
  100% { opacity:0; transform:scale(4); border-color:transparent; }
}

/* Ripple waves */
.ripple {
  position:absolute;
  border-radius:50%;
  border:1.5px solid rgba(255,102,204,0.6);
  width:60px; height:60px;
  left:50%; top:50%;
  transform:translate(-50%,-50%) scale(0);
  pointer-events:none;
  animation:rippleOut var(--rip-dur,1.2s) ease-out var(--rip-delay,0s) forwards;
}
@keyframes rippleOut {
  0%   { transform:translate(-50%,-50%) scale(0); opacity:0.8; border-color:rgba(255,102,204,0.6); }
  100% { transform:translate(-50%,-50%) scale(28); opacity:0; border-color:rgba(255,102,204,0); }
}

/* Overlay fade out */
#introOverlay.fadeOut {
  animation:overlayFade 0.7s ease-out 0.55s forwards;
}
@keyframes overlayFade {
  from { opacity:1; }
  to   { opacity:0; }
}

/* Overlay particle sparks */
.spark {
  position:absolute;
  width:3px; height:3px;
  border-radius:50%;
  background:var(--pink);
  box-shadow:0 0 6px var(--pink);
  pointer-events:none;
  animation:sparkFly var(--sp-dur,0.8s) ease-out forwards;
}
@keyframes sparkFly {
  0%   { opacity:1; transform:translate(0,0) scale(1); }
  100% { opacity:0; transform:translate(var(--sp-tx,0px),var(--sp-ty,0px)) scale(0); }
}

/* ══════════════════════════════════════════
   MAIN CONTENT
══════════════════════════════════════════ */
#mainContent {
  opacity:0; transform:translateY(0);
  transition:opacity 0.9s ease, transform 0.9s ease;
  min-height:100vh;
}
#mainContent.visible {
  opacity:1; transform:translateY(0);
}

/* ─── PROJECT HERO ─── */
.project-hero {
  width:100%;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-end;
  padding-bottom:64px;
  position:relative;
  overflow:hidden;
}

.hero-bg-gradient {
  position:absolute; inset:0;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(255,102,204,0.06) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 80%, rgba(204,102,255,0.04) 0%, transparent 50%);
  pointer-events:none;
}

.project-header {
  position:relative; z-index:10;
  display:flex; flex-direction:column;
  align-items:center; text-align:center;
  gap:16px;
  padding-top:120px;
  width:100%;
}

.project-tag {
  font-family:'Cormorant Garamond',serif; font-weight:300;
  font-size:0.68rem; letter-spacing:0.44em; text-transform:uppercase;
  color:var(--dimmer);
}

.project-title {
  font-family:'Cormorant Garamond',serif; font-weight:300;
  font-size:clamp(2.2rem,5.5vw,4.8rem);
  letter-spacing:0.08em;
  color:var(--white);
  line-height:1.1;
}

.project-subtitle {
  font-family:'Cormorant Garamond',serif; font-weight:300;
  font-style:italic;
  font-size:clamp(0.95rem,1.6vw,1.3rem);
  letter-spacing:0.18em;
  color:var(--dim);
}

.title-divider {
  width:60px; height:1px;
  background:linear-gradient(90deg,transparent,var(--pink),transparent);
  margin:4px auto;
}

.project-meta {
  display:flex; gap:40px; align-items:center;
  margin-top:8px;
}
.meta-item {
  display:flex; flex-direction:column; align-items:center; gap:4px;
}
.meta-label {
  font-size:0.6rem; letter-spacing:0.38em; text-transform:uppercase;
  color:var(--dimmer);
}
.meta-value {
  font-size:0.88rem; letter-spacing:0.14em;
  color:var(--dim);
}
.meta-sep {
  width:1px; height:30px;
  background:linear-gradient(180deg,transparent,rgba(255,102,204,0.3),transparent);
}

/* ─── PROJECT IMAGE ── 修改部分 ─── */
.project-image-wrap {
  width:100%;
  position:relative;
  margin-top:56px;
  /* 两侧留出合适距离，使用 padding 收窄图片区域 */
  padding-left: clamp(24px, 6vw, 96px);
  padding-right: clamp(24px, 6vw, 96px);
  box-sizing: border-box;
}

.project-image-inner {
  width:100%;
  max-width:1400px;
  margin:0 auto;
  display:block;
  position:relative;
  /* 可选：加圆角让图片更精致 */
  border-radius: 8px;
  overflow: hidden;
}

.project-image-inner img {
  width:100%;
  height:auto;
  display:block;
  border-top:1px solid rgba(255,102,204,0.12);
}

/* Fade image edges into black */
.project-image-inner::before {
  content:'';
  position:absolute;
  top:0; left:0; right:0; height:80px;
  background:linear-gradient(180deg,#000 0%,transparent 100%);
  z-index:2; pointer-events:none;
}
.project-image-inner::after {
  content:'';
  position:absolute;
  bottom:0; left:0; right:0; height:120px;
  background:linear-gradient(0deg,#000 0%,transparent 100%);
  z-index:2; pointer-events:none;
}

/* ─── SCROLL HINT ─── */
.scroll-hint {
  position:absolute;
  bottom:28px; left:50%;
  transform:translateX(-50%);
  display:flex; flex-direction:column; align-items:center; gap:8px;
  opacity:0;
  animation:scrollHintFade 1s ease 3.6s forwards;
  pointer-events:none; z-index:20;
}
@keyframes scrollHintFade {
  from { opacity:0; transform:translateX(-50%) translateY(8px); }
  to   { opacity:1; transform:translateX(-50%) translateY(0); }
}
.scroll-hint-line {
  width:1px; height:36px;
  background:linear-gradient(180deg,transparent,rgba(255,102,204,0.5),transparent);
  animation:scrollLinePulse 2s ease-in-out infinite 3.6s;
}
@keyframes scrollLinePulse {
  0%,100% { opacity:0.4; transform:scaleY(0.8); }
  50%     { opacity:1;   transform:scaleY(1); }
}
.scroll-hint-text {
  font-size:0.58rem; letter-spacing:0.38em; text-transform:uppercase;
  color:var(--dimmer);
}

/* ─── BG ACCENT STARS ─── */
.bg-stars { position:fixed; inset:0; pointer-events:none; z-index:3; }
.bg-star {
  position:absolute; color:var(--pink); font-size:var(--sz,18px); opacity:0;
  animation:bgStarBreath var(--bd,3s) ease-in-out infinite alternate;
  animation-delay:var(--bdelay,0s);
  filter:drop-shadow(0 0 4px var(--pink));
  line-height:1; user-select:none;
}
@keyframes bgStarBreath {
  0%   { opacity:0.08; transform:scale(0.9) rotate(0deg); }
  100% { opacity:0.4;  transform:scale(1.15) rotate(20deg); }
}
</style>
</head>

<!-- Cursor -->
<script>
(function(){
  const dot  = document.getElementById('cursor');
  const ring = document.getElementById('cursorRing');
  let mx = window.innerWidth/2, my = window.innerHeight/2;
  let rx = mx, ry = my;
  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    dot.style.left = mx+'px'; dot.style.top = my+'px';
  });
  function animRing(){
    rx += (mx-rx)*0.09; ry += (my-ry)*0.09;
    ring.style.left = rx+'px'; ring.style.top = ry+'px';
    requestAnimationFrame(animRing);
  }
  animRing();
  function attachHover(sel){
    document.querySelectorAll(sel).forEach(el=>{
      el.addEventListener('mouseenter',()=>ring.classList.add('hover'));
      el.addEventListener('mouseleave',()=>ring.classList.remove('hover'));
    });
  }
  attachHover('a, .back-home');
})();
</script>

<!-- Starfield + BG stars -->
<script>
(function(){
  const sf = document.getElementById('starfield');
  for(let i=0;i<80;i++){
    const s=document.createElement('span');
    const sz=Math.random()*1.8+0.6;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*5+3).toFixed(1)}s;--op:${(Math.random()*0.15+0.04).toFixed(2)};animation-delay:${(Math.random()*6).toFixed(1)}s;`;
    sf.appendChild(s);
  }
  const bs=document.getElementById('bgStars');
  const positions=[
    {x:'8%',y:'78%',sz:'22px',d:'3.1s',delay:'0s'},
    {x:'15%',y:'55%',sz:'10px',d:'2.7s',delay:'0.4s'},
    {x:'6%',y:'30%',sz:'14px',d:'3.8s',delay:'1.1s'},
    {x:'88%',y:'20%',sz:'12px',d:'2.5s',delay:'0.7s'},
    {x:'92%',y:'65%',sz:'18px',d:'4.0s',delay:'0.2s'},
    {x:'75%',y:'88%',sz:'10px',d:'3.3s',delay:'1.5s'},
    {x:'40%',y:'92%',sz:'16px',d:'2.9s',delay:'0.9s'},
    {x:'55%',y:'12%',sz:'9px',d:'3.5s',delay:'0.3s'},
  ];
  positions.forEach(p=>{
    const el=document.createElement('div');
    el.className='bg-star';
    el.textContent='\u2726';
    el.style.cssText=`left:${p.x};top:${p.y};--sz:${p.sz};--bd:${p.d};--bdelay:${p.delay};`;
    bs.appendChild(el);
  });
})();
</script>

<!-- Floating Stars -->
<script>
(function(){
  const container=document.getElementById('floatStars');
  const reducedMotion=window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  const SPAWN_RATE=reducedMotion?0.3:4.0;
  const MAX_STARS=reducedMotion?10:100;
  const DRIFT_REDUCE=reducedMotion?0.15:1;
  const CHARS=['\u2726','\u2727'];
  const COLORS=['#ff66cc','#dd77ff','#cc66ff','#ff88dd'];
  let dissolveY=window.innerHeight*0.33;
  window.addEventListener('resize',()=>{ dissolveY=window.innerHeight*0.33; });
  let stars=[],spawnAccum=0,lastTime=null;
  function spawnStar(){
    if(stars.length>=MAX_STARS)return;
    const el=document.createElement('div');
    el.className='fstar';
    const sz=6+Math.random()*12;
    const col=COLORS[Math.floor(Math.random()*COLORS.length)];
    const op=0.2+Math.random()*0.4;
    el.style.setProperty('--fsz',sz+'px');
    el.style.setProperty('--fcol',col);
    el.textContent=CHARS[Math.floor(Math.random()*CHARS.length)];
    const x=Math.random()*window.innerWidth;
    const y=window.innerHeight*(1.02+Math.random()*0.08);
    const speed=(22+Math.random()*38)*DRIFT_REDUCE;
    const driftFreq=0.4+Math.random()*0.8;
    const driftAmp=(8+Math.random()*18)*DRIFT_REDUCE;
    const driftOff=Math.random()*Math.PI*2;
    const fadeDur=500+Math.random()*400;
    el.style.left=x+'px'; el.style.top=y+'px'; el.style.opacity=op;
    container.appendChild(el);
    stars.push({el,x,y,speed,driftFreq,driftAmp,driftOff,baseOp:op,fadeDur,fading:false,fadeStart:0});
  }
  function tick(ts){
    if(!lastTime)lastTime=ts;
    const dt=Math.min((ts-lastTime)/1000,0.1);
    lastTime=ts;
    spawnAccum+=SPAWN_RATE*dt;
    while(spawnAccum>=1){ spawnStar(); spawnAccum-=1; }
    const toRemove=[];
    stars.forEach((p,i)=>{
      p.y-=p.speed*dt;
      const driftX=p.x+Math.sin(ts*0.001*p.driftFreq+p.driftOff)*p.driftAmp;
      p.el.style.left=driftX+'px'; p.el.style.top=p.y+'px';
      if(!p.fading&&p.y<=dissolveY){ p.fading=true; p.fadeStart=ts; }
      if(p.fading){
        const prog=Math.min((ts-p.fadeStart)/p.fadeDur,1);
        p.el.style.opacity=p.baseOp*(1-prog);
        if(prog>=1)toRemove.push(i);
      }
    });
    for(let i=toRemove.length-1;i>=0;i--){
      container.removeChild(stars[toRemove[i]].el);
      stars.splice(toRemove[i],1);
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();
</script>

<!-- Intro Animation Sequencer -->
<script>
(function(){
  const overlay   = document.getElementById('introOverlay');
  const mainStar  = document.getElementById('mainStar');
  const ring1     = document.getElementById('ring1');
  const ring2     = document.getElementById('ring2');
  const ring3     = document.getElementById('ring3');
  const content   = document.getElementById('mainContent');
  const nav       = document.getElementById('mainNav');
  const backHome  = document.getElementById('backHome');
  const sideLeft  = document.getElementById('sideLeft');
  const sideRight = document.getElementById('sideRight');
  const burst     = document.getElementById('heroBurst');

  setTimeout(()=>{
    mainStar.classList.add('breathing');
    [ring1,ring2,ring3].forEach(r=>r.classList.add('visible'));
  }, 700);

  setTimeout(()=>{
    mainStar.classList.remove('breathing');
    mainStar.classList.add('explode');
    [ring1,ring2,ring3].forEach(r=>r.classList.add('explode'));

    for(let i=0;i<18;i++){
      const spark = document.createElement('div');
      spark.className = 'spark';
      const angle = (i/18)*Math.PI*2;
      const dist  = 80+Math.random()*160;
      const tx    = Math.cos(angle)*dist;
      const ty    = Math.sin(angle)*dist;
      const dur   = (0.5+Math.random()*0.5).toFixed(2)+'s';
      spark.style.cssText = `
        left:50%; top:50%;
        --sp-tx:${tx.toFixed(0)}px;
        --sp-ty:${ty.toFixed(0)}px;
        --sp-dur:${dur};
        background:${Math.random()>0.5?'#ff66cc':'#cc66ff'};
        box-shadow:0 0 6px ${Math.random()>0.5?'#ff66cc':'#cc66ff'};
      `;
      burst.appendChild(spark);
    }

    for(let i=0;i<3;i++){
      const ripple = document.createElement('div');
      ripple.className='ripple';
      ripple.style.setProperty('--rip-delay', (i*0.18)+'s');
      ripple.style.setProperty('--rip-dur', '1.1s');
      burst.appendChild(ripple);
    }
  }, 2200);

  setTimeout(()=>{
    overlay.classList.add('fadeOut');
  }, 2750);

  setTimeout(()=>{
    overlay.classList.add('done');
    overlay.style.display='none';
    content.classList.add('visible');
    nav.classList.add('visible');
    backHome.classList.add('visible');
    sideLeft.classList.add('visible');
    sideRight.classList.add('visible');
  }, 3300);
})();
</script>
